# jira-cli configuration — copy to ~/.config/jira-cli/config.toml
#
# Manage multiple Jira instances under [instances.<alias>].
# The alias is used with the --instance flag or set as the default below.

default_instance = "cloud"

# ── Jira Cloud (API token) ───────────────────────────────────────────────────
[instances.cloud]
url          = "https://mycompany.atlassian.net"
username     = "user@mycompany.com"
api_key      = "ATATT3xFfGF0..."   # https://id.atlassian.com/manage-profile/security/api-tokens
api_version  = 2                    # 2 (default) or 3

# ── Jira Server / Data Center (username + password) ──────────────────────────
[instances.server]
url          = "https://jira.internal.example.com"
username     = "john.doe"
password     = "s3cr3t"
api_version  = 2

# ── Saved queries ─────────────────────────────────────────────────────────────
# Run with: jira query <name>
# List all: jira query
#
# Each query requires a `jql` field. `limit` and `columns` are optional and
# can be overridden at runtime with --limit / --columns.

[queries.my-work]
jql = "assignee = currentUser() AND status != Done ORDER BY updated DESC"

[queries.blocked]
jql     = "status = Blocked ORDER BY priority DESC"
limit   = 50

[queries.review]
jql     = "status = \"In Review\" ORDER BY updated DESC"
columns = "key,type,status,assignee,summary"

[queries.release]
jql     = "fixVersions = '2.0.0' AND status != Done ORDER BY priority DESC"
limit   = 100
columns = "key,type,status,assignee,priority,summary"
